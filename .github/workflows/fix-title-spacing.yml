name: Fix Article Title Spacing

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/fix-title-spacing.yml

permissions:
  contents: write

jobs:
  patch-title-css:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Append article title spacing override
        run: |
          python3 - <<'PY'
          from pathlib import Path
          css = Path('quartz/styles/custom.scss')
          s = css.read_text()
          marker = 'ARTICLE TITLE SPACING HOTFIX'
          block = r'''

/* =========================
   ARTICLE TITLE SPACING HOTFIX
   Prevent title backplate from overlapping page metadata.
   ========================= */
.center .page-header h1:not(.avv-title),
.center article > h1:first-child:not(.avv-title) {
  display: inline-block !important;
  width: fit-content !important;
  max-width: 100% !important;
  margin-top: 0.25rem !important;
  margin-bottom: 1.35rem !important;
  padding: 0.14em 0.38em 0.16em 1.25rem !important;
  line-height: 1.08 !important;
}

.center .page-header h1:not(.avv-title)::before,
.center article > h1:first-child:not(.avv-title)::before {
  inset: -0.08em -0.24em !important;
  border-radius: 10px !important;
}

.center .page-header .content-meta,
.center .page-header .page-meta {
  margin-bottom: 0.55rem !important;
}
'''
          if marker not in s:
            css.write_text(s + block)
          PY

      - name: Commit title spacing fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add quartz/styles/custom.scss .github/workflows/fix-title-spacing.yml
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Fix article title spacing and backplate sizing"
            git push
          fi
